version: 1
rules:
  - id: code-changes-need-build-test
    when:
      tags: [code-changes]
    then:
      - type: requiresGate
        gateType: build
      - type: requiresGate
        gateType: test
      - type: requiresGate
        gateType: lint
  - id: high-risk-needs-human-review
    when:
      riskLevel: [high]
    then:
      - type: requiresGate
        gateType: human
        gateKey: high-risk-review
  - id: security-changes-need-scan
    when:
      tags: [security, auth, permissions]
    then:
      - type: requiresGate
        gateType: security-scan
