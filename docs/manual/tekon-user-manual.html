<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>天工 Tekon — User Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=LXGW+WenKai:wght@300;400;700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink-deepest:#08090d;--ink-deep:#0e1018;--ink-mid:#161822;--ink-light:#1e2030;
  --ink-faint:#282a3a;--ink-whisper:#353849;
  --vermillion:#c43a31;--vermillion-bright:#e8503a;--vermillion-glow:#ff6b52;--vermillion-deep:#8b1a12;
  --gold:#c9a96e;--gold-bright:#e8c88a;--gold-dim:#8a7a4e;
  --jade:#4a9e7a;--jade-bright:#5ec49a;--jade-dim:#2a6e52;
  --paper:#e8e0d0;--paper-bright:#f2ece0;--paper-dim:#c8bfae;--paper-faint:#a89e8e;
  --text-primary:#d8d0c2;--text-secondary:#9a9488;--text-dim:#6a655e;--text-bright:#f0e8da;
  --code-bg:#0c0d14;--code-border:#2a2c3e;
  --sidebar-w:260px;--header-h:60px;--content-max:880px;
  --font-display:'Noto Serif SC','Songti SC',serif;
  --font-en:'Playfair Display','Georgia',serif;
  --font-body:'LXGW WenKai','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--ink-deepest);color:var(--text-primary);line-height:1.8;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-whisper);border-radius:3px}
::selection{background:var(--vermillion);color:var(--paper-bright)}

/* Header */
.site-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(8,9,13,.9);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-bottom:1px solid rgba(201,169,110,.08);z-index:1000;display:flex;align-items:center;padding:0 24px}
.header-inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.brand{display:flex;align-items:center;gap:14px}
.brand-seal{width:36px;height:36px;background:var(--vermillion);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:16px;color:var(--paper-bright);box-shadow:0 2px 10px rgba(196,58,49,.3);transform:rotate(-2deg);position:relative;flex-shrink:0}
.brand-seal::after{content:'';position:absolute;inset:2px;border:1px solid rgba(255,255,255,.15);border-radius:2px}
.brand-text{display:flex;flex-direction:column;line-height:1.2}
.brand-zh{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text-bright);letter-spacing:2px}
.brand-en{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:16px}
.lang-toggle{display:flex;border:1px solid var(--ink-whisper);border-radius:3px;overflow:hidden}
.lang-btn{padding:5px 12px;border:none;background:transparent;color:var(--text-secondary);font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.lang-btn.active{background:var(--vermillion);color:var(--paper-bright)}
.lang-btn:hover:not(.active){color:var(--text-primary);background:rgba(201,169,110,.06)}
.header-badge{padding:3px 10px;border:1px solid var(--ink-whisper);border-radius:3px;font-size:10px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.5px}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px}

/* Layout */
.layout{display:flex;margin-top:var(--header-h);min-height:calc(100vh - var(--header-h))}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex-shrink:0;position:fixed;top:var(--header-h);left:0;bottom:0;background:var(--ink-deep);border-right:1px solid rgba(201,169,110,.06);overflow-y:auto;padding:16px 0;z-index:100}
.sidebar.show{display:block!important}
.nav-section{margin-bottom:4px}
.nav-section-label{font-family:var(--font-display);font-size:10px;font-weight:600;color:var(--gold-dim);letter-spacing:2.5px;text-transform:uppercase;padding:10px 20px 6px;display:flex;align-items:center;gap:6px;opacity:.7}
.nav-section-label::before{content:'';width:3px;height:10px;background:var(--gold-dim);border-radius:1px;opacity:.5}
.nav-tab{display:flex;align-items:center;gap:8px;padding:8px 20px 8px 28px;cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .15s ease;border-left:2px solid transparent;user-select:none;text-decoration:none;background:none;font-family:inherit;width:100%;text-align:left;border-top:none;border-right:none;border-bottom:none}
.nav-tab:hover{color:var(--text-primary);background:rgba(201,169,110,.025)}
.nav-tab.active{color:var(--gold-bright);background:rgba(201,169,110,.05);border-left-color:var(--gold)}
.nav-tab .tab-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-whisper);flex-shrink:0;transition:background .2s}
.nav-tab.active .tab-dot{background:var(--vermillion);box-shadow:0 0 6px rgba(196,58,49,.4)}
.nav-tab .tab-num{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);min-width:16px;opacity:.5}
.nav-tab.active .tab-num{color:var(--gold);opacity:1}
.nav-divider{height:1px;background:rgba(201,169,110,.05);margin:8px 20px}

/* Content Area */
.content-area{margin-left:var(--sidebar-w);flex:1;min-height:calc(100vh - var(--header-h))}

/* Tab Panels */
.tab-panel{display:none;max-width:var(--content-max);margin:0 auto;padding:40px 44px 100px;animation:fadeSlideIn .35s var(--ease-out-expo)}
.tab-panel.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Section Header */
.section-header{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid rgba(201,169,110,.1);position:relative}
.section-header::after{content:'';position:absolute;bottom:-1px;left:0;width:48px;height:2px;background:var(--vermillion)}
.section-num{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--vermillion);letter-spacing:2px;margin-bottom:6px;display:block}
.section-title{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--text-bright);line-height:1.3;letter-spacing:1px}
.section-subtitle{font-size:14px;color:var(--text-secondary);margin-top:10px;line-height:1.7}
h3{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--text-bright);margin:40px 0 16px;padding-left:14px;border-left:3px solid var(--vermillion);line-height:1.4}
h4{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--gold-bright);margin:28px 0 12px}
p{margin-bottom:14px;font-size:14px;line-height:1.85;color:var(--text-primary)}
strong{color:var(--text-bright);font-weight:600}
ul,ol{margin:10px 0 18px 0;padding-left:22px}
li{margin-bottom:6px;font-size:14px;line-height:1.8;color:var(--text-primary)}
li::marker{color:var(--gold-dim)}
code:not(pre code){font-family:var(--font-mono);font-size:12px;background:rgba(201,169,110,.08);color:var(--gold-bright);padding:2px 6px;border-radius:3px;border:1px solid rgba(201,169,110,.1)}
pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:5px;padding:16px 20px;margin:14px 0 20px;overflow-x:auto;position:relative}
pre::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--vermillion),var(--gold-dim),transparent);border-radius:5px 5px 0 0;opacity:.5}
pre code{font-family:var(--font-mono);font-size:12.5px;line-height:1.65;color:var(--text-primary);background:none;border:none;padding:0;white-space:pre-wrap;word-break:break-word}
.cmd{color:var(--jade-bright)}.arg{color:var(--gold-bright)}.str{color:#a8d4a0}.flag{color:#80b4f0}.path{color:var(--paper-dim)}.cmt{color:var(--text-dim);font-style:italic}.kw{color:var(--vermillion-bright)}.num{color:#d4a0d4}

/* Tables */
.table-wrap{overflow-x:auto;margin:14px 0 24px;border-radius:5px;border:1px solid var(--ink-faint)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:rgba(201,169,110,.05)}
th{font-family:var(--font-display);font-weight:600;color:var(--gold-bright);text-align:left;padding:10px 14px;border-bottom:1px solid var(--ink-faint);white-space:nowrap;font-size:12px;letter-spacing:.5px}
td{padding:8px 14px;border-bottom:1px solid rgba(40,42,58,.4);color:var(--text-primary);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,169,110,.015)}
td code{font-size:11px}

/* Callouts */
.callout{border-radius:5px;padding:14px 18px;margin:16px 0;font-size:13px;line-height:1.7;border-left:3px solid}
.callout-warn{background:rgba(196,58,49,.05);border-color:var(--vermillion)}
.callout-info{background:rgba(74,158,122,.05);border-color:var(--jade)}
.callout-tip{background:rgba(201,169,110,.05);border-color:var(--gold)}
.callout-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.callout-warn .callout-label{color:var(--vermillion-bright)}
.callout-info .callout-label{color:var(--jade-bright)}
.callout-tip .callout-label{color:var(--gold-bright)}

/* Flow Diagrams */
.flow-diagram{margin:20px 0 28px;padding:24px;background:var(--code-bg);border:1px solid var(--code-border);border-radius:6px;overflow-x:auto}
.flow-diagram svg{display:block;max-width:100%;height:auto}
.flow-box{fill:var(--ink-mid);stroke:var(--ink-whisper);stroke-width:1;rx:4}
.flow-box.active{fill:rgba(196,58,49,.12);stroke:var(--vermillion);stroke-width:1.5}
.flow-box.gold{fill:rgba(201,169,110,.08);stroke:var(--gold-dim)}
.flow-box.jade{fill:rgba(74,158,122,.08);stroke:var(--jade-dim)}
.flow-label{font-family:var(--font-mono);font-size:11px;fill:var(--text-primary);text-anchor:middle}
.flow-label.title{font-family:var(--font-display);font-size:12px;font-weight:600;fill:var(--text-bright)}
.flow-label.cn{font-family:var(--font-body);font-size:9px;fill:var(--text-secondary)}
.flow-arrow{stroke:var(--gold-dim);stroke-width:1;fill:none;marker-end:url(#arrowhead)}
.flow-arrow.vermillion{stroke:var(--vermillion)}
/* Pipeline specific */
.pipe-box{fill:var(--ink-mid);stroke:var(--ink-whisper);stroke-width:1}
.pipe-box.highlight{fill:rgba(196,58,49,.1);stroke:var(--vermillion);stroke-width:1.5}
.pipe-label{font-family:var(--font-mono);font-size:10px;fill:var(--gold-bright);text-anchor:middle}
.pipe-desc{font-family:var(--font-body);font-size:9px;fill:var(--text-secondary);text-anchor:middle}
.pipe-arrow{stroke:var(--ink-whisper);stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}

/* Concept Grid */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:18px 0 28px}
.concept-card{background:var(--ink-mid);border:1px solid var(--ink-faint);border-radius:5px;padding:18px;transition:all .2s ease}
.concept-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.concept-card h4{margin:0 0 6px;font-size:15px}
.concept-card p{font-size:12.5px;color:var(--text-secondary);margin:0;line-height:1.7}

/* Scenario Cards */
.scenario-card{background:var(--ink-mid);border:1px solid var(--ink-faint);border-radius:7px;padding:20px 24px;margin:16px 0;position:relative;overflow:hidden}
.scenario-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--vermillion),var(--gold-dim))}
.scenario-label{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--vermillion-bright);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.scenario-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-bright);margin-bottom:8px}
.scenario-steps{counter-reset:step;list-style:none;padding-left:0}
.scenario-steps li{counter-increment:step;padding-left:28px;position:relative;margin-bottom:7px;font-size:13px}
.scenario-steps li::before{content:counter(step);position:absolute;left:0;top:1px;width:18px;height:18px;background:var(--ink-faint);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--gold)}

/* Command Block */
.cmd-block{background:var(--ink-mid);border:1px solid var(--ink-faint);border-radius:6px;margin:16px 0 24px;overflow:hidden}
.cmd-block-header{background:rgba(201,169,110,.03);padding:8px 16px;border-bottom:1px solid var(--ink-faint);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cmd-block-header .cmd-name{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--jade-bright)}
.cmd-block-header .cmd-desc{font-size:12px;color:var(--text-secondary);margin-left:auto}
.cmd-block pre{margin:0;border:none;border-radius:0}
.cmd-block pre::before{display:none}
.cmd-section{padding:12px 16px;border-top:1px solid var(--ink-faint)}
.cmd-section-title{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 16px}
.tag{font-family:var(--font-mono);font-size:10px;padding:3px 9px;border-radius:3px;border:1px solid}
.tag-red{border-color:var(--vermillion-deep);color:var(--vermillion-bright);background:rgba(196,58,49,.06)}
.tag-gold{border-color:var(--gold-dim);color:var(--gold-bright);background:rgba(201,169,110,.06)}
.tag-jade{border-color:var(--jade-dim);color:var(--jade-bright);background:rgba(74,158,122,.06)}

/* Install Banner */
.install-banner{background:linear-gradient(135deg,var(--ink-mid),rgba(196,58,49,.06));border:1px solid rgba(196,58,49,.12);border-radius:6px;padding:20px 24px;margin:18px 0 24px;position:relative;overflow:hidden}
.install-banner::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(196,58,49,.08),transparent 70%);border-radius:50%;pointer-events:none}
.install-label{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--vermillion-bright);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.install-banner pre{margin:0;background:var(--ink-deepest)}

/* Footer */
.content-footer{margin-top:56px;padding-top:28px;border-top:1px solid rgba(201,169,110,.07);text-align:center}
.footer-seal{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:var(--vermillion-deep);border-radius:50%;font-family:var(--font-display);font-size:19px;font-weight:900;color:rgba(232,224,208,.25);border:2px solid rgba(196,58,49,.15);margin-bottom:10px}
.footer-text{font-size:11px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:1px}

/* Scenario Flow SVG */
.sflow-box{stroke-width:1.2;rx:5}
.sflow-agent{fill:rgba(74,158,122,.1);stroke:var(--jade-dim)}
.sflow-human{fill:rgba(201,169,110,.1);stroke:var(--gold-dim)}
.sflow-label{font-family:var(--font-mono);font-size:10.5px;fill:var(--text-primary)}
.sflow-label.cmd{font-family:var(--font-mono);font-size:9.5px;fill:var(--jade-bright)}
.sflow-label.title{font-family:var(--font-display);font-size:11px;font-weight:600;fill:var(--text-bright)}
.sflow-step{font-family:var(--font-mono);font-size:9px;font-weight:700;fill:var(--paper-bright);text-anchor:middle}
.sflow-step-bg.agent{fill:var(--jade-dim)}
.sflow-step-bg.human{fill:var(--gold-dim)}
.sflow-arrow{stroke:var(--ink-whisper);stroke-width:1.2;fill:none;marker-end:url(#arrowhead)}
.sflow-legend text{font-family:var(--font-body);font-size:10px;fill:var(--text-secondary)}
.sflow-legend rect{width:10px;height:10px;rx:2}

/* Decorative */
.deco-line{width:36px;height:1px;background:var(--gold-dim);margin:28px 0;opacity:.35}

/* Mobile Nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,9,13,.96);backdrop-filter:blur(16px);border-top:1px solid var(--ink-faint);z-index:1000;overflow-x:auto;padding:6px 8px;gap:2px}
.mobile-nav-btn{flex-shrink:0;padding:6px 10px;border:none;background:transparent;color:var(--text-secondary);font-family:var(--font-mono);font-size:10px;cursor:pointer;border-radius:3px;white-space:nowrap}
.mobile-nav-btn.active{background:rgba(196,58,49,.15);color:var(--vermillion-bright)}

/* EN mode overrides */
html.en .brand-zh{font-size:13px}
html.en h3{font-family:var(--font-en),var(--font-display),serif}
html.en .section-title{font-family:var(--font-en),var(--font-display),serif}

/* Responsive */
@media(max-width:1024px){
  .sidebar{display:none}
  .sidebar.show{display:block!important;position:fixed;top:var(--header-h);left:0;bottom:0;z-index:200;box-shadow:8px 0 32px rgba(0,0,0,.4)}
  .content-area{margin-left:0}
  .tab-panel{padding:28px 20px 90px}
  .mobile-menu-btn{display:block}
  .mobile-nav{display:flex}
  .section-title{font-size:24px}
}
@media(max-width:640px){
  .tab-panel{padding:20px 14px 90px}
  .section-title{font-size:20px}
  h3{font-size:17px}
  .header-badge{display:none}
  .site-header{padding:0 14px}
  .concept-grid{grid-template-columns:1fr}
  pre{padding:12px 14px}
  pre code{font-size:11px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-seal">天工</div>
      <div class="brand-text">
        <span class="brand-zh">天工 Tekon</span>
        <span class="brand-en">Tekon Manual</span>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-toggle" id="langToggle">
        <button class="lang-btn active" data-lang="zh">中</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <span class="header-badge">V2</span>
    </div>
    <button class="mobile-menu-btn" id="menuBtn" aria-label="菜单" aria-expanded="false">☰</button>
  </div>
</header>

<div class="layout">
<nav class="sidebar" id="sidebar">
  <div class="nav-section"><div class="nav-section-label" data-i18n="认识天工">认识天工</div>
    <button class="nav-tab active" data-tab="0"><span class="tab-dot"></span><span data-i18n="天工是什么">天工是什么</span></button>
    <button class="nav-tab" data-tab="1"><span class="tab-dot"></span><span data-i18n="解决什么问题">解决什么问题</span></button>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section"><div class="nav-section-label" data-i18n="上手指南">上手指南</div>
    <button class="nav-tab" data-tab="2"><span class="tab-dot"></span><span data-i18n="核心场景">核心场景</span></button>
    <button class="nav-tab" data-tab="3"><span class="tab-dot"></span><span data-i18n="Quick Start">Quick Start</span></button>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section"><div class="nav-section-label" data-i18n="深入理解">深入理解</div>
    <button class="nav-tab" data-tab="4"><span class="tab-dot"></span><span data-i18n="核心概念">核心概念</span></button>
    <button class="nav-tab" data-tab="5"><span class="tab-dot"></span><span data-i18n="命令详解">命令详解</span></button>
  </div>
  <div class="nav-divider"></div>

function scenarioFlowSVG(title,desc,steps){
  const H=28,G=6,W=520,LX=28,RX=LX+24,RW=W-52;
  let h=80,y=24,svg='';
  // Title
  svg+=`<text x="${LX}" y="${y}" class="sflow-label title">${title}</text>\n`;
  y+=18;
  if(desc){svg+=`<text x="${LX}" y="${y}" class="sflow-label" style="font-size:9.5px;fill:var(--text-secondary)">${desc}</text>\n`;y+=16;}
  y+=8;
  // Steps
  steps.forEach((s,i)=>{
    const isHuman=s.actor==='human';
    const cls=isHuman?'sflow-human':'sflow-agent';
    const bgCls=isHuman?'human':'agent';
    const actorLabel=isHuman?'You':'Tekon';
    const actorColor=isHuman?'var(--gold-bright)':'var(--jade-bright)';
    const lines=s.label.length>44?[s.label.substring(0,44),s.label.substring(44)]:[s.label];
    const boxH=lines.length>1?H+14:H;
    svg+=`<rect x="${LX}" y="${y}" width="${RW}" height="${boxH}" class="sflow-box ${cls}"/>\n`;
    svg+=`<circle cx="${LX+16}" cy="${y+boxH/2}" r="11" class="sflow-step-bg ${bgCls}"/>\n`;
    svg+=`<text x="${LX+16}" y="${y+boxH/2+3.5}" class="sflow-step">${i+1}</text>\n`;
    svg+=`<text x="${LX+34}" y="${y+13}" class="sflow-label" style="fill:${actorColor};font-weight:700;font-size:8.5px">${actorLabel}</text>\n`;
    svg+=`<text x="${LX+34}" y="${y+25}" class="sflow-label cmd">${lines[0]}</text>\n`;
    if(lines[1]) svg+=`<text x="${LX+34}" y="${y+38}" class="sflow-label cmd">${lines[1]}</text>\n`;
    y+=boxH+G;
    if(i<steps.length-1){svg+=`<line x1="${LX+RW/2}" y1="${y-G+2}" x2="${LX+RW/2}" y2="${y+4}" class="sflow-arrow"/>\n`;y+=8;}
    h+=boxH+G+(i<steps.length-1?8:0);
  });
  // Legend
  y+=4;h+=20;
  svg+=`<g class="sflow-legend" transform="translate(${LX},${y})">\n`;
  svg+=`<rect x="0" y="0" class="sflow-step-bg agent"/><text x="14" y="9">Tekon / Agent</text>\n`;
  svg+=`<rect x="110" y="0" class="sflow-step-bg human"/><text x="124" y="9">You / Human</text>\n`;
  svg+=`</g>\n`;
  h+=20;
  return `<div class="flow-diagram"><svg viewBox="0 0 ${W} ${h}" width="100%" height="auto">\n${svg}</svg></div>`;
}

function scenarioCard(label,title,desc,steps,extra){
  let h='<div class="scenario-card"><div class="scenario-label">'+label+'</div><div class="scenario-title">'+title+'</div>';
  if(desc) h+='<p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">'+desc+'</p>';
  if(extra) h+=extra;
  if(steps.length){h+='<ol class="scenario-steps">';steps.forEach(s=>h+='<li>'+s+'</li>');h+='</ol>';}
  h+='</div>';return h;
}

function cmdBlock(name,desc,code,section){
  let h='<div class="cmd-block"><div class="cmd-block-header"><span class="cmd-name">'+name+'</span><span class="cmd-desc">'+desc+'</span></div>';
  h+='<pre><code>'+code+'</code></pre>';
  if(section) h+=section;
  h+='</div>';return h;
}

const T = {

    sections: [
      {num:"01",title:"天工是什么",sub:"天工（Tekon）是一个本地 Agent workflow 框架——一个“受控研发工作台”。",
       html:`
<p>天工（Tekon）是一个本地 Agent workflow 框架——一个"受控研发工作台"：用户把研发需求交给天工，天工会按固定 workflow 拆成角色任务、在隔离 worktree 中执行、跑验证 gate、沉淀 artifact 和审计记录，最后整理出可审阅材料和 PR 准备包。</p>
<p>天工的核心目标是<strong>增强人类交付能力</strong>。它帮助你把需求推进到"可以人工审阅、可以准备 PR、可以继续验证"的状态；合入、上线、权限扩大、生产变更仍然由人控制。</p>
<div class="deco-line"></div>
<h3>当前定位</h3>
<div class="concept-grid">
<div class="concept-card"><h4>本地 CLI/Web 工具</h4><p>在你自己的机器上运行，不依赖远程服务。</p></div>
<div class="concept-card"><h4>受控 Workflow 执行器</h4><p>按固定流程拆解、执行、验证研发任务。</p></div>
<div class="concept-card"><h4>证据与审阅收集器</h4><p>统一收集 artifact、gate 日志、审计事件。</p></div>
<div class="concept-card"><h4>PR 准备助手</h4><p>帮你生成可审阅材料和 PR 准备包。</p></div>
<div class="concept-card"><h4>研发工作样本评估器</h4><p>评估真实样本是否达到试用门槛。</p></div>
<div class="concept-card"><h4>多 Provider 执行入口</h4><p>支持 mock、Claude Code 和 Codex provider。</p></div>
</div>
<div class="callout callout-info"><span class="callout-label">名称说明</span>天工的英文名是 Tekon，取 Tech + Kong 的融合谐音，中文名取"天工"，源自《天工开物》。</div>
`},
      {num:"02",title:"天工解决什么问题",sub:"五个核心痛点，天工逐一应对。",
       html:`
<h3>2.1 需求进入研发前不清楚</h3>
<p>真实工作里，很多需求只有一句话。直接交给 Agent 容易出现边界不清、验收标准不清、风险不清。天工提供 <code>demand shape</code>，先把需求塑形成需求卡，包含：需求标题和正文、推荐 workflow 模板、风险等级和风险标签、非目标、开放问题、验收标准。用户可以先审阅和批准需求卡，再发起执行。</p>
<h3>2.2 不知道该选什么 Workflow</h3>
<div class="tag-list">${['standard-feature','bugfix','test-improvement','docs-update','plan-only','standard-delivery'].map(t=>`<span class="tag tag-jade">${t}</span>`).join('')}</div>
<p><code>standard-delivery</code> 是标准交付治理流程，包含 PM/RD/QA/Reviewer/PMO 完整角色链路、独立评审、AC evidence、QA signoff 和流程完整性 gate。<code>workflow select</code> 给出推荐模板和理由；<code>eval workflow-selection</code> 检查选择是否合理。</p>
<h3>2.3 Agent 输出不可审阅</h3>
<p>天工要求 provider 输出结构化 artifact，并把 gate、日志、审计事件和 PR 包统一组织。用户通过 <code>review</code> 或 Web dashboard 查看：readiness 失败项、证据入口、Gate 失败诊断、影响文件和 diff、Artifact 正文、Gate 日志、PR 准备包、下一步建议。</p>
<h3>2.4 远端副作用需要人控制</h3>
<p>真实 push、创建 PR、等待远端 CI 都属于有副作用或外部依赖的动作。天工把这些动作拆开：</p>
${flowSVG_delivery()}
<h3>2.5 需要判断一次 run 是否真的可交付</h3>
<p><code>eval readiness</code> 评估单个 run 的交付证据是否完整。<code>eval work-usability</code> 评估一组真实样本是否达到试用门槛。</p>
`},
      {num:"03",title:"核心用户场景",sub:"五种典型场景，从功能开发到工具评估。图中绿色为 Tekon 自动执行，金色为需人工操作。",
       html:`
<div class="scenario-card"><div class="scenario-label">SCENARIO A</div><div class="scenario-title">我有一个小功能，希望推进到可审 PR</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">适用：给内部工具增加筛选条件、为 CLI 补低风险命令、给 Web dashboard 增加入口。</p>
${scenarioFlowSVG('完整交付流程','从需求到可审 PR 的端到端路径',[

  {label:'审阅需求卡，确认边界和验收标准',actor:'human'},
  {label:'demand approve — 批准需求卡',actor:'human'},

</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO B</div><div class="scenario-title">我只想修一个 bug，但需要人工确认风险</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">适用：修改已有逻辑分支、修复低风险接口问题、调整内部工具状态处理。</p>
${scenarioFlowSVG('Bug 修复 + 人工审批流程','',[
  {label:'bugfix 模板运行，进入 reviewer human gate',actor:'agent'},
  {label:'approval summary — 生成可复制审批摘要',actor:'agent'},

<div class="scenario-card"><div class="scenario-label">SCENARIO C</div><div class="scenario-title">我只想补测试</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">适用：为模块补单测、为失败路径补回归测试、为 CLI/Web API 增加覆盖。</p>
${scenarioFlowSVG('测试补齐流程','',[
  {label:'workflow select — 确认推荐 test-improvement 模板',actor:'agent'},
  {label:'tekon run --template test-improvement',actor:'agent'},

</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO D</div><div class="scenario-title">我只想写文档或方案</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">适用：更新用户手册、整理验收报告、写技术方案或产品方案。</p>
<div class="tag-list"><span class="tag tag-gold">docs-update — 文档更新</span><span class="tag tag-gold">plan-only — 只做方案，不执行代码</span><span class="tag tag-gold">standard-delivery — 完整角色链路验证</span></div>
<p style="font-size:13px;color:var(--text-secondary)"><code>standard-delivery</code> 适合 Tekon 自身 dogfooding 和低风险种子任务。</p>

      {num:"04",title:"Quick Start",sub:"以下示例假设 <code>tekon</code> 已安装到 PATH，并且你正在目标项目根目录执行命令。",
       html:`
<div class="install-banner"><div class="install-label">⬇ 一键安装</div><pre><code><span class="cmd">curl</span> <span class="flag">-fsSL</span> <span class="str">https://raw.githubusercontent.com/zesming/tekon/main/scripts/install.sh</span> <span class="flag">|</span> <span class="cmd">bash</span></code></pre></div>
<p>安装脚本自动完成：克隆仓库 → 安装依赖 → 构建项目 → 配置 <code>tekon</code> 到 PATH。执行 <code>source ~/.zshrc</code> 即可使用。前置依赖：<code>git</code>、<code>node</code>(>=18)、<code>npm</code>。</p>
<pre><code><span class="kw">TEKON_HOME</span>=<span class="str">/opt/tekon</span> <span class="kw">TEKON_VERSION</span>=<span class="str">main</span> <span class="cmd">curl</span> <span class="flag">-fsSL</span> <span class="str">https://raw.githubusercontent.com/zesming/tekon/main/scripts/install.sh</span> <span class="flag">|</span> <span class="cmd">bash</span></code></pre>
${flowSVG_quickstart()}
<h3>4.2 初始化目标仓库</h3><pre><code><span class="cmd">tekon</span> <span class="arg">init</span></code></pre>
<p>初始化会在目标仓库生成 <code>.tekon/</code> 运行态目录，包含配置、数据库、工作区、workflow、角色和 Web session token。</p>
<h3>4.3 检查命令画像</h3><pre><code><span class="cmd">tekon</span> <span class="arg">workflow preflight</span></code></pre>
<div class="table-wrap"><table><thead><tr><th>状态</th><th>含义</th></tr></thead><tbody>
<tr><td><code>resolved</code></td><td>该 gate 命令已解析</td></tr>
<tr><td><code>missing</code></td><td>目标仓库缺少对应命令</td></tr>
<tr><td><code>not-applicable</code></td><td>用户显式声明不适用</td></tr>
<tr><td><code>not-command-gate</code></td><td>schema、role-scope、QA signoff 等语义 gate</td></tr>
<tr><td><code>suggestedCommand</code></td><td>天工从 package.json 推断的候选命令</td></tr>
</tbody></table></div>
<h3>4.4 塑形需求</h3>
<pre><code><span class="cmd">tekon</span> <span class="arg">demand shape</span> <span class="str">"给 Web dashboard 增加审批摘要展示，要求 e2e 通过"</span>
<span class="cmd">tekon</span> <span class="arg">demand approve</span>
<span class="cmd">tekon</span> <span class="arg">eval demand-shape</span></code></pre>
<h3>4.5 发起运行</h3>
<pre><code><span class="cmd">tekon</span> <span class="arg">run</span>
<span class="cmt"># 长程任务超时控制</span>
<span class="cmd">tekon</span> <span class="arg">run</span> <span class="flag">--timeout-ms</span> <span class="num">7200000</span> <span class="flag">--no-progress-timeout-ms</span> <span class="num">1200000</span>
<span class="cmt"># 使用 mock provider 离线回归</span>
<span class="cmd">tekon</span> <span class="arg">run</span> <span class="flag">--template</span> <span class="str">standard-delivery</span> <span class="flag">--agent</span> <span class="str">mock</span></code></pre>
<div class="callout callout-info"><span class="callout-label">Provider 说明</span>默认使用 Codex provider。真实 provider 通过 <code>TEKON_OUTPUT_DIR</code> 写回结构化 artifact，默认总超时 1 小时，可用 <code>--timeout-ms</code> 等参数覆盖。远端副作用仍由 <code>delivery create-pr --approve-human</code> 人工批准后执行。</div>
<h3>4.6 查看结果</h3><pre><code><span class="cmd">tekon</span> <span class="arg">status</span>
<span class="cmd">tekon</span> <span class="arg">review</span></code></pre>
<h3>4.7 准备 PR</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery prepare</span></code></pre>
<p>当前只支持 <code>standard-delivery</code> 治理 run，只生成本地 PR 包，生成前会执行 pre-PR readiness 校验。</p>
<h3>4.8 创建远端 PR</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery create-pr</span> <span class="flag">--approve-human</span></code></pre>
<h3>4.9 查询远端 CI</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery ci-status</span>
<span class="cmd">tekon</span> <span class="arg">delivery ci-watch</span> <span class="flag">--max-attempts</span> <span class="num">20</span> <span class="flag">--interval-ms</span> <span class="num">15000</span>
<span class="cmd">tekon</span> <span class="arg">eval readiness</span></code></pre>
<h3>4.10 默认上下文规则</h3>
<p>天工的常规 CLI 使用方式是"进入目标仓库根目录后执行短命令"。默认推断：<code>--repo</code> 从当前目录向上查找 <code>.tekon/config.yaml</code>；<code>demand shape/approve</code> 默认操作最近需求卡；<code>run/status/review/delivery prepare</code> 默认使用最近一次 run；<code>approval summary/approve/reject/resume</code> 默认使用最近的 pending human decision。</p>
<div class="callout callout-tip"><span class="callout-label">显式传参的三种情况</span><strong>1.</strong> 跨目录操作时传 <code>--repo</code>；<strong>2.</strong> 查看历史对象时传 <code>--run-id</code> 等；<strong>3.</strong> 高危动作保留 <code>--approve-human</code>。</div>
`},
      {num:"05",title:"核心概念",sub:"理解天工的十一个基础构件。",
       html:`
${flowSVG_workflow()}
<div class="concept-grid">
<div class="concept-card"><h4>5.1 Repo</h4><p>目标仓库，即你希望天工处理的项目。天工自身仓库和目标仓库可以相同，也可以不同。</p></div>
<div class="concept-card"><h4>5.2 .tekon/</h4><p>天工在目标仓库中的运行态目录。保存配置、SQLite 数据库、run artifact、gate 日志、worktree 等。通常不提交。</p></div>
<div class="concept-card"><h4>5.3 Run</h4><p>一次 workflow 执行。每个 run 有唯一 <code>runId</code>。查看状态、审阅、准备 PR 都围绕 run id。</p></div>
<div class="concept-card"><h4>5.4 Workflow</h4><p>一组有顺序和依赖的角色节点。内置模板：<code>standard-feature</code>、<code>bugfix</code>、<code>test-improvement</code>、<code>docs-update</code>、<code>plan-only</code>、<code>standard-delivery</code>。</p></div>
<div class="concept-card"><h4>5.5 Role</h4><p>执行节点的角色：PM、RD、QA、Reviewer、PMO。决定 prompt、知识和工具策略。</p></div>
<div class="concept-card"><h4>5.6 Gate</h4><p>验证关卡：build、lint、test、schema、security-scan、human、independent-review、role-scope、ac-evidence、qa-signoff、process-completeness。</p></div>
<div class="concept-card"><h4>5.7 Provider</h4><p>执行节点的 agent 后端：<code>mock</code>、<code>claude-code</code>、<code>codex</code>。真实 provider 需提供 artifact manifest。</p></div>
<div class="concept-card"><h4>5.8 Artifact</h4><p>结构化产物：需求卡、代码变更说明、测试报告、审阅报告、PR 包、CI 状态。</p></div>
<div class="concept-card"><h4>5.9 Review Surface</h4><p>聚合审阅面。CLI 命令是 <code>review</code>，Web dashboard 也使用同一套数据。</p></div>
<div class="concept-card"><h4>5.10 Readiness</h4><p>单次 run 的工作就绪度评估。回答："workflow、gate、artifact、PR、CI 证据是否完整？"</p></div>
<div class="concept-card"><h4>5.11 Work Usability</h4><p>样本集级评估。回答："天工是否已在足够多真实样本上表现稳定？"</p></div>
</div>`},
      {num:"06",title:"命令详解",sub:"天工 CLI 全部命令的参数、用法和故障处理。",
       html:commandsHTML()},
      {num:"07",title:"Web Dashboard",sub:"本地 Web dashboard，用于审阅和人工决策。",
       html:`
<h3>启动</h3>
<pre><code><span class="kw">TEKON_PROJECT_ROOT</span>=<span class="str">/path/to/project</span> <span class="cmd">npm exec</span> <span class="flag">--yes</span> <span class="flag">--</span> <span class="cmd">pnpm@10.12.1</span> <span class="flag">--filter</span> <span class="str">@tekon/web</span> <span class="arg">dev</span></code></pre>
<p>Web dashboard 适合：查看项目 overview、选择历史 run、查看 readiness/evidence/diff/artifact/gate log/PR 包、处理 human approval、发起受控模板 run、触发 delivery prepare 和 delivery create-pr。</p>
<div class="callout callout-warn"><span class="callout-label">Session Token</span>写操作依赖 <code>init</code> 生成的 <code>.tekon/web-session.json</code>。没有 token 时写操作会被拒绝。token 不应提交。</div>
<p>Web 是本地 dashboard，不是远程服务。Web create-pr 和 CLI 一样，未批准时只落库等待审批，批准后才 push 和创建 PR。</p>
`},
      {num:"08",title:"如何判断结果是否可信",sub:"不要只看“命令退出 0”。建议按顺序看。",
       html:`
<ol class="scenario-steps" style="padding-left:0">
<li style="padding-left:28px"><code>status</code>：workflow 是否 passed。</li>
<li style="padding-left:28px"><code>review</code>：失败项和证据是否能解释。</li>
<li style="padding-left:28px">Changed Files：影响文件是否符合预期。</li>
<li style="padding-left:28px">Artifacts：需求、变更、测试、审阅证据是否完整。</li>
<li style="padding-left:28px">Gate Logs：build/lint/test/security 是否真的跑过。</li>
<li style="padding-left:28px">PR Package：PR body 是否能让 reviewer 看懂。</li>
<li style="padding-left:28px">CI Status：远端 checks 是否已记录。</li>
<li style="padding-left:28px"><code>eval readiness</code>：PR/CI 证据是否完整。</li>
</ol>
<div class="callout callout-warn"><span class="callout-label">重要</span>如果其中任何一步说不清楚，不要继续创建 PR 或批准高风险动作。</div>
`},
      {num:"09",title:"常见问题处理",sub:"",
       html:`
<h3>9.1 workflow preflight 显示 missing command</h3><p>原因：目标仓库没有配置对应命令。处理：看 <code>suggestedCommand</code> → 写入 <code>.tekon/repo-profile.yaml</code> → 再跑 <code>workflow preflight</code>。</p>
<h3>9.2 run 拒绝 dirty base</h3><p>原因：有未提交业务改动。处理：先提交/stash，或追加 <code>--allow-dirty-base</code>。</p>
<h3>9.3 pending human gate</h3><p>处理：<code>approval summary</code> → <code>eval approval-summary</code> → <code>resume --approve-human</code> 或 <code>approval reject</code>。</p>
<h3>9.4 readiness 不通过</h3><p>常见原因：workflow 没 passed、pending gate、验证 gate 失败、security scan 失败。处理：先看 <code>review</code> 的 failed checks。</p>
<h3>9.5 delivery create-pr 失败</h3><p>常见原因：没有 <code>gh</code>、认证失败、工作区 dirty、PR 已存在。</p>
<h3>9.6 ci-status 查询失败</h3><p>常见原因：run 没有 PR URL、selector 不对。处理：用 <code>--selector</code> 明确指定。</p>
<h3>9.7 Artifact 被拒绝入库</h3><p>原因：产物命中密钥模式。处理：删除密钥内容，使用安全摘要。</p>
<h3>9.8 Web 写操作被拒绝</h3><p>处理：重新执行 <code>init</code> 生成 token → 确认 <code>TEKON_PROJECT_ROOT</code> 正确。</p>
<h3>9.9 Codex provider 运行失败</h3><p>处理：先验证 <code>codex --version</code> → 查看 <code>.tekon/runs/&lt;runId&gt;/&lt;nodeId&gt;/</code> 下产物。不要把失败降级成 mock 通过。</p>
`},
      {num:"10",title:"参数速查",sub:"",
       html:`
<h3>全局常见参数</h3>

<tr><td><code>--shape &lt;path&gt;</code></td><td>指定需求卡路径</td></tr>

<tr><td><code>--demand-file &lt;path&gt;</code></td><td>指定需求卡</td></tr>
<tr><td><code>--dynamic / --dry-run</code></td><td>动态 workflow 预览</td></tr>

<tr><td><code>--max-attempts &lt;n&gt;</code></td><td>最大轮询次数</td></tr>
<tr><td><code>--interval-ms &lt;ms&gt;</code></td><td>每次轮询间隔</td></tr>
<tr><td><code>--backoff &lt;n&gt;</code></td><td>轮询退避倍率</td></tr>

`},

  en: {
    sections: [
      {num:"01",title:"What is Tekon",sub:"Tekon is a local Agent workflow framework — a \"governed development workbench\".",
       html:`
<p>Tekon is a local Agent workflow framework — a "governed development workbench". You hand a development task to Tekon, and it breaks it down by role, executes in isolated worktrees, runs verification gates, collects artifacts and audit trails, and produces reviewable materials and PR packages.</p>
<p>Its core mission is to <strong>augment human delivery capability</strong>. It advances your task to a state where it can be reviewed, PR-ready, and ready for further verification — while merge, deploy, and permission escalation remain under human control.</p>
<div class="deco-line"></div>
<h3>Current Positioning</h3>
<div class="concept-grid">
<div class="concept-card"><h4>Local CLI/Web Tool</h4><p>Runs on your own machine. No remote services required.</p></div>
<div class="concept-card"><h4>Governed Workflow Executor</h4><p>Breaks down, executes, and verifies tasks through fixed workflows.</p></div>
<div class="concept-card"><h4>Evidence & Review Collector</h4><p>Unified collection of artifacts, gate logs, and audit events.</p></div>
<div class="concept-card"><h4>PR Preparation Assistant</h4><p>Generates reviewable materials and PR packages.</p></div>
<div class="concept-card"><h4>Work Sample Evaluator</h4><p>Evaluates whether real-world samples meet adoption thresholds.</p></div>
<div class="concept-card"><h4>Multi-Provider Runtime</h4><p>Supports mock, Claude Code, and Codex providers.</p></div>
</div>
<div class="callout callout-info"><span class="callout-label">Name</span>Tekon combines "Tech" + "Kong". The Chinese name 天工 references <em>Tiangong Kaiwu</em>, a classic Chinese encyclopedia of craftsmanship.</div>
`},
      {num:"02",title:"Problems Solved",sub:"Five core pain points, addressed one by one.",
       html:`
<h3>2.1 Vague Requirements</h3>
<p>Real-world tasks often come as one-liners. Tekon's <code>demand shape</code> turns them into structured demand cards with: title, recommended template, risk level, non-goals, open questions, and acceptance criteria. Review and approve before execution.</p>
<h3>2.2 Which Workflow to Use?</h3>
<div class="tag-list">${['standard-feature','bugfix','test-improvement','docs-update','plan-only','standard-delivery'].map(t=>`<span class="tag tag-jade">${t}</span>`).join('')}</div>
<p><code>standard-delivery</code> is the full governance pipeline with PM/RD/QA/Reviewer/PMO roles, independent review, AC evidence, and QA signoff. <code>workflow select</code> recommends the best template; <code>eval workflow-selection</code> validates the choice.</p>
<h3>2.3 Unreviewable Agent Output</h3>
<p>Tekon requires structured artifacts and organizes gates, logs, audit events, and PR packages into a unified review surface accessible via <code>review</code> or the Web dashboard.</p>
<h3>2.4 Controlled Side Effects</h3>
${flowSVG_delivery()}
<h3>2.5 Is a Run Actually Deliverable?</h3>
<p><code>eval readiness</code> assesses a single run's evidence completeness. <code>eval work-usability</code> evaluates whether a sample set meets the bar for real-world adoption.</p>
`},
      {num:"03",title:"Core Scenarios",sub:"Five typical scenarios. Green = Tekon auto, Gold = human action.",
       html:`
<div class="scenario-card"><div class="scenario-label">SCENARIO A</div><div class="scenario-title">Small Feature → Reviewable PR</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Examples: add a filter to an internal tool, add a low-risk CLI command, add an entry to the Web dashboard.</p>
${scenarioFlowSVG('End-to-End Delivery Pipeline','',[
  {label:'tekon init — initialize the target repo',actor:'agent'},
  {label:'demand shape — create a demand card',actor:'agent'},
  {label:'Review the demand card, confirm scope',actor:'human'},
  {label:'demand approve — approve the card',actor:'human'},
  {label:'tekon run — execute the workflow',actor:'agent'},
  {label:'status / review — check results and evidence',actor:'human'},
  {label:'delivery prepare — generate PR package',actor:'agent'},
  {label:'Confirm, then delivery create-pr --approve-human',actor:'human'},
  {label:'delivery ci-status / ci-watch — record CI evidence',actor:'agent'},
  {label:'eval readiness — verify delivery completeness',actor:'agent'}
])}
</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO B</div><div class="scenario-title">Bug Fix with Human Gate</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Examples: modify an existing logic branch, fix a low-risk API issue.</p>
${scenarioFlowSVG('Bug Fix + Human Approval','',[
  {label:'Run with bugfix template, enter reviewer human gate',actor:'agent'},
  {label:'approval summary — generate reviewable summary',actor:'agent'},
  {label:'eval approval-summary — check completeness',actor:'agent'},
  {label:'Decide: resume --approve-human or approval reject',actor:'human'}
])}
</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO C</div><div class="scenario-title">Test Coverage</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Examples: add unit tests, add regression tests, increase coverage for CLI/Web API.</p>
${scenarioFlowSVG('Test Improvement Flow','',[
  {label:'workflow select — confirm test-improvement template',actor:'agent'},
  {label:'tekon run --template test-improvement',actor:'agent'},
  {label:'Check whether gates pass (build/lint/test)',actor:'human'},
  {label:'tekon review — inspect artifacts and test evidence',actor:'human'}
])}
</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO D</div><div class="scenario-title">Documentation & Planning</div><p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Examples: update manuals, organize review reports, write technical/product plans.</p>
<div class="tag-list"><span class="tag tag-gold">docs-update — Docs only</span><span class="tag tag-gold">plan-only — Plan, no code</span><span class="tag tag-gold">standard-delivery — Full role chain</span></div>
</div>

<div class="scenario-card"><div class="scenario-label">SCENARIO E</div><div class="scenario-title">Evaluate Tekon Readiness</div>
${scenarioFlowSVG('Work Usability Evaluation','',[
  {label:'Pick 2-3 real but low-risk repos',actor:'human'},
  {label:'Prepare 10 real or historical tasks',actor:'human'},
  {label:'eval work-usability record — write sample per run',actor:'agent'},
  {label:'eval work-usability --samples — evaluate sample set',actor:'agent'},
  {label:'Save Markdown/HTML reports to docs/reviews/',actor:'human'}
])}
</div>
`},
      {num:"04",title:"Quick Start",sub:"Examples assume <code>tekon</code> is in PATH and you're in the target project root.",
       html:`
<div class="install-banner"><div class="install-label">⬇ One-Line Install</div><pre><code><span class="cmd">curl</span> <span class="flag">-fsSL</span> <span class="str">https://raw.githubusercontent.com/zesming/tekon/main/scripts/install.sh</span> <span class="flag">|</span> <span class="cmd">bash</span></code></pre></div>
<p>The script clones the repo, installs dependencies, builds, and adds <code>tekon</code> to PATH. Run <code>source ~/.zshrc</code> afterwards. Prerequisites: <code>git</code>, <code>node</code>(>=18), <code>npm</code>.</p>
${flowSVG_quickstart()}
<h3>4.2 Initialize Repo</h3><pre><code><span class="cmd">tekon</span> <span class="arg">init</span></code></pre>
<h3>4.3 Check Command Profile</h3><pre><code><span class="cmd">tekon</span> <span class="arg">workflow preflight</span></code></pre>
<h3>4.4 Shape & Approve Demand</h3>
<pre><code><span class="cmd">tekon</span> <span class="arg">demand shape</span> <span class="str">"Add approval summary display to Web dashboard with e2e passing"</span>
<span class="cmd">tekon</span> <span class="arg">demand approve</span>
<span class="cmd">tekon</span> <span class="arg">eval demand-shape</span></code></pre>
<h3>4.5 Run</h3>
<pre><code><span class="cmd">tekon</span> <span class="arg">run</span>
<span class="cmt"># Long-running task with timeout control</span>
<span class="cmd">tekon</span> <span class="arg">run</span> <span class="flag">--timeout-ms</span> <span class="num">7200000</span> <span class="flag">--no-progress-timeout-ms</span> <span class="num">1200000</span>
<span class="cmt"># Mock provider for offline regression</span>
<span class="cmd">tekon</span> <span class="arg">run</span> <span class="flag">--template</span> <span class="str">standard-delivery</span> <span class="flag">--agent</span> <span class="str">mock</span></code></pre>
<div class="callout callout-info"><span class="callout-label">Provider</span>Defaults to Codex. Real providers write structured artifacts via <code>TEKON_OUTPUT_DIR</code>. Default timeout: 1h. Remote side effects only via <code>delivery create-pr --approve-human</code>.</div>
<h3>4.6 View Results</h3><pre><code><span class="cmd">tekon</span> <span class="arg">status</span> ; <span class="cmd">tekon</span> <span class="arg">review</span></code></pre>
<h3>4.7 Prepare PR</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery prepare</span></code></pre>
<h3>4.8 Create PR</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery create-pr</span> <span class="flag">--approve-human</span></code></pre>
<h3>4.9 CI Status</h3><pre><code><span class="cmd">tekon</span> <span class="arg">delivery ci-status</span>
<span class="cmd">tekon</span> <span class="arg">delivery ci-watch</span> <span class="flag">--max-attempts</span> <span class="num">20</span>
<span class="cmd">tekon</span> <span class="arg">eval readiness</span></code></pre>
<h3>4.10 Default Context Rules</h3>
<p>Commands auto-detect the target repo, latest run, latest demand card, and latest pending decision. Explicit flags needed only for: cross-directory operations (<code>--repo</code>), historical objects (<code>--run-id</code>), and high-risk actions (<code>--approve-human</code>).</p>
`},
      {num:"05",title:"Core Concepts",sub:"Eleven building blocks of Tekon.",
       html:`
${flowSVG_workflow()}
<div class="concept-grid">
<div class="concept-card"><h4>5.1 Repo</h4><p>The target repository Tekon operates on.</p></div>
<div class="concept-card"><h4>5.2 .tekon/</h4><p>Runtime directory: config, SQLite DB, artifacts, gate logs, worktrees. Not committed.</p></div>
<div class="concept-card"><h4>5.3 Run</h4><p>A single workflow execution with unique <code>runId</code>.</p></div>
<div class="concept-card"><h4>5.4 Workflow</h4><p>Ordered role nodes. Templates: <code>standard-feature</code>, <code>bugfix</code>, <code>test-improvement</code>, <code>docs-update</code>, <code>plan-only</code>, <code>standard-delivery</code>.</p></div>
<div class="concept-card"><h4>5.5 Role</h4><p>PM, RD, QA, Reviewer, PMO — determines prompt, knowledge, and tool policy.</p></div>
<div class="concept-card"><h4>5.6 Gate</h4><p>Verification checkpoints: build, lint, test, schema, security-scan, human, independent-review, role-scope, ac-evidence, qa-signoff, process-completeness.</p></div>
<div class="concept-card"><h4>5.7 Provider</h4><p>Agent backend: <code>mock</code>, <code>claude-code</code>, <code>codex</code>.</p></div>
<div class="concept-card"><h4>5.8 Artifact</h4><p>Structured outputs: demand cards, change descriptions, test reports, review reports, PR packages, CI status.</p></div>
<div class="concept-card"><h4>5.9 Review Surface</h4><p>Unified review view via CLI <code>review</code> or Web dashboard.</p></div>
<div class="concept-card"><h4>5.10 Readiness</h4><p>Per-run delivery completeness: "Are workflow, gates, artifacts, PR, and CI evidence all complete?"</p></div>
<div class="concept-card"><h4>5.11 Work Usability</h4><p>Sample-set evaluation: "Has Tekon performed stably on enough real samples?"</p></div>
</div>`},
      {num:"06",title:"Command Reference",sub:"All CLI commands with parameters, usage, and troubleshooting.",
       html:commandsHTML_EN()},
      {num:"07",title:"Web Dashboard",sub:"Local dashboard for review and human decisions.",
       html:`
<h3>Launch</h3>
<pre><code><span class="kw">TEKON_PROJECT_ROOT</span>=<span class="str">/path/to/project</span> <span class="cmd">npm exec</span> <span class="flag">--yes</span> <span class="flag">--</span> <span class="cmd">pnpm@10.12.1</span> <span class="flag">--filter</span> <span class="str">@tekon/web</span> <span class="arg">dev</span></code></pre>
<p>Suitable for: project overview, run list, historical runs, readiness/evidence/diff/artifacts/gate logs/PR packages, human approval, controlled template runs, delivery prepare and create-pr.</p>
<div class="callout callout-warn"><span class="callout-label">Session Token</span>Write operations require <code>.tekon/web-session.json</code> generated by <code>init</code>. The token must not be committed.</div>
`},
      {num:"08",title:"How to Judge Results",sub:"Don't just check exit code 0. Go through these in order.",
       html:`
<ol class="scenario-steps" style="padding-left:0">
<li style="padding-left:28px"><code>status</code> — is the workflow passed?</li>
<li style="padding-left:28px"><code>review</code> — can failures and evidence be explained?</li>
<li style="padding-left:28px">Changed Files — do they match expectations?</li>
<li style="padding-left:28px">Artifacts — are requirements, changes, tests, and reviews complete?</li>
<li style="padding-left:28px">Gate Logs — did build/lint/test/security actually run?</li>
<li style="padding-left:28px">PR Package — can a reviewer understand the PR body?</li>
<li style="padding-left:28px">CI Status — are remote checks recorded?</li>
<li style="padding-left:28px"><code>eval readiness</code> — is PR/CI evidence complete?</li>
</ol>
<div class="callout callout-warn"><span class="callout-label">Important</span>If any step is unclear, do not proceed to create a PR or approve high-risk actions.</div>
`},
      {num:"09",title:"FAQ",sub:"",
       html:`
<h3>9.1 preflight shows missing command</h3><p>Check <code>suggestedCommand</code> → write to <code>.tekon/repo-profile.yaml</code> → re-run <code>workflow preflight</code>.</p>
<h3>9.2 Run rejected: dirty base</h3><p>Commit/stash unrelated changes, or add <code>--allow-dirty-base</code>.</p>
<h3>9.3 Pending human gate</h3><p><code>approval summary</code> → <code>eval approval-summary</code> → <code>resume --approve-human</code> or <code>approval reject</code>.</p>
<h3>9.4 Readiness fails</h3><p>Common: workflow not passed, pending gates, verification gate failure, security scan failure. Check <code>review</code> failed checks first.</p>
<h3>9.5 create-pr fails</h3><p>Common: no <code>gh</code> CLI, auth failure, dirty worktree, PR already exists.</p>
<h3>9.6 ci-status fails</h3><p>Common: run has no PR URL, wrong selector. Use <code>--selector</code> to specify.</p>
<h3>9.7 Artifact rejected</h3><p>The artifact matched a key/token pattern. Remove secrets and use safe summaries.</p>
<h3>9.8 Web write rejected</h3><p>Re-run <code>init</code> to generate token → verify <code>TEKON_PROJECT_ROOT</code>.</p>
<h3>9.9 Codex provider fails</h3><p>Verify <code>codex --version</code> → check artifacts in <code>.tekon/runs/&lt;runId&gt;/&lt;nodeId&gt;/</code>. Don't downgrade to mock.</p>
`},

<tr><td><code>--shape &lt;path&gt;</code></td><td>Specify demand card path</td></tr>

`},

// ═══════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════
let currentLang='zh';
let currentTab=0;
const container=document.getElementById('tabContainer');
const sidebar=document.getElementById('sidebar');
const mobileNav=document.getElementById('mobileNav');

function renderTabs(){
  const data=T[currentLang].sections;
  // Content panels
  container.innerHTML=data.map((s,i)=>`<div class="tab-panel${i===currentTab?' active':''}" id="panel${i}">
    <div class="section-header"><span class="section-num">SECTION ${s.num}</span><h1 class="section-title">${s.title}</h1><p class="section-subtitle">${s.sub}</p></div>
    ${s.html}
  </div>`).join('');
  // Update nav
  sidebar.querySelectorAll('.nav-tab').forEach((el,i)=>{el.classList.toggle('active',i===currentTab)});
  // Mobile nav
  mobileNav.innerHTML=data.map((s,i)=>`<button class="mobile-nav-btn${i===currentTab?' active':''}" data-tab="${i}">${s.num}</button>`).join('');
  bindEvents();
}

function bindEvents(){
  // Sidebar tabs
  sidebar.querySelectorAll('.nav-tab').forEach(el=>{el.onclick=()=>switchTab(parseInt(el.dataset.tab))});
  // Mobile tabs
  mobileNav.querySelectorAll('.mobile-nav-btn').forEach(el=>{el.onclick=()=>switchTab(parseInt(el.dataset.tab))});
}

function switchTab(i){
  currentTab=i;
  document.querySelectorAll('.tab-panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  sidebar.querySelectorAll('.nav-tab').forEach((el,j)=>el.classList.toggle('active',j===i));
  mobileNav.querySelectorAll('.mobile-nav-btn').forEach((el,j)=>el.classList.toggle('active',j===i));
  container.scrollIntoView({behavior:'smooth',block:'start'});
  if(window.innerWidth<1025){sidebar.classList.remove('show');document.getElementById('menuBtn').setAttribute('aria-expanded','false');}
}

// Language toggle
document.getElementById('langToggle').addEventListener('click',function(e){
  const btn=e.target.closest('.lang-btn');
  if(!btn||btn.classList.contains('active'))return;
  currentLang=btn.dataset.lang;
  this.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b===btn));
  document.documentElement.lang=currentLang==='zh'?'zh-CN':'en';
  document.documentElement.classList.toggle('en',currentLang==='en');
  applyI18nLabels();
  try{localStorage.setItem('tekon-lang',currentLang)}catch(e){}
  renderTabs();
});

const navI18n={
  '认识天工':'Overview','天工是什么':'What is Tekon','解决什么问题':'Problems Solved',
  '上手指南':'Getting Started','核心场景':'Scenarios','Quick Start':'Quick Start',
  '深入理解':'Deep Dive','核心概念':'Core Concepts','命令详解':'Command Reference',
  '更多':'More','Web Dashboard':'Web Dashboard','判断结果':'Judging Results',
  '常见问题':'FAQ','参数速查':'Parameters','使用说明':'Usage Notes',
};
function applyI18nLabels(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    el.textContent=currentLang==='zh'?key:(navI18n[key]||key);
  });
}

// Mobile menu
document.getElementById('menuBtn').addEventListener('click',function(){
  var open=sidebar.classList.toggle('show');
  this.setAttribute('aria-expanded',String(open));
});
document.addEventListener('click',function(e){
  if(!sidebar.contains(e.target)&&e.target!==document.getElementById('menuBtn')&&!document.getElementById('menuBtn').contains(e.target)){
    sidebar.classList.remove('show');
    document.getElementById('menuBtn').setAttribute('aria-expanded','false');
  }
});

// Init
(function(){
  var saved;
  try{saved=localStorage.getItem('tekon-lang')}catch(e){saved=null}
  if(saved==='en'){
    currentLang='en';
    document.documentElement.lang='en';
    document.documentElement.classList.add('en');
    document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang==='en')});
  }
  renderTabs();
  if(saved==='en') applyI18nLabels();
})();
</script>
