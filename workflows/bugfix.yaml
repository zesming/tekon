id: bugfix
name: Bugfix
version: 1
retry:
  maxAttempts: 2
  backoffMs: 250
  strategy: fixed
phases:
  - id: pm
    name: PM
    nodes:
      - id: pm-triage
        role: pm
        outputs:
          - demand:demand-card
        gates:
          - type: schema
            artifactType: demand-card
  - id: rd
    name: RD
    dependsOn:
      - pm
    nodes:
      - id: rd-fix
        role: rd
        inputs:
          - demand:demand-card
        outputs:
          - code:code-changes
        gates:
          - type: build
            commandRef: build
          - type: lint
            commandRef: lint
          - type: security-scan
            commandRef: security
          - type: schema
            artifactType: code-changes
  - id: qa-review
    name: QA and Reviewer
    dependsOn:
      - rd
    nodes:
      - id: qa-regression
        role: qa
        inputs:
          - demand:demand-card
          - code:code-changes
        outputs:
          - test:test-report
          - qa-release-signoff:qa-release-signoff
        gates:
          - type: test
            commandRef: test
          - type: schema
            artifactType: test-report
          - type: schema
            artifactType: qa-release-signoff
          - type: qa-signoff
            artifactType: qa-release-signoff
      - id: reviewer-review
        role: reviewer
        inputs:
          - code:code-changes
        outputs:
          - review:review-report
        gates:
          - type: human
            requiresHumanApproval: true
  - id: pmo
    name: PMO
    dependsOn:
      - qa-review
    nodes:
      - id: pmo-delivery
        role: pmo
        inputs:
          - test:test-report
          - qa-release-signoff:qa-release-signoff
          - review:review-report
        outputs:
          - delivery:delivery-package
        gates:
          - type: schema
            artifactType: delivery-package
