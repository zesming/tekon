id: standard-feature
name: Standard Feature
version: 1
retry:
  maxAttempts: 3
  backoffMs: 500
  strategy: exponential
phases:
  - id: pm
    name: PM
    nodes:
      - id: pm-intake
        role: pm
        outputs:
          - demand:demand-card
          - prd:prd
        gates:
          - type: schema
            artifactType: demand-card
          - type: schema
            artifactType: prd
  - id: rd
    name: RD
    dependsOn:
      - pm
    nodes:
      - id: rd-implementation
        role: rd
        inputs:
          - prd:prd
        outputs:
          - design:tech-design
          - code:code-changes
        gates:
          - type: build
            commandRef: build
          - type: lint
            commandRef: lint
          - type: security-scan
            commandRef: security
          - type: schema
            artifactType: tech-design
          - type: schema
            artifactType: code-changes
  - id: qa
    name: QA
    dependsOn:
      - rd
    nodes:
      - id: qa-validation
        role: qa
        inputs:
          - demand:demand-card
          - prd:prd
          - code:code-changes
        outputs:
          - test:test-report
          - qa-release-signoff:qa-release-signoff
        gates:
          - type: test
            commandRef: test
          - type: schema
            artifactType: test-report
          - type: schema
            artifactType: qa-release-signoff
          - type: qa-signoff
            artifactType: qa-release-signoff
  - id: reviewer
    name: Reviewer
    dependsOn:
      - qa
    nodes:
      - id: reviewer-independent-review
        role: reviewer
        inputs:
          - design:tech-design
          - code:code-changes
          - test:test-report
        outputs:
          - review:review-report
        gates:
          - type: schema
            artifactType: review-report
  - id: pmo
    name: PMO
    dependsOn:
      - reviewer
    nodes:
      - id: pmo-delivery
        role: pmo
        inputs:
          - review:review-report
          - qa-release-signoff:qa-release-signoff
        outputs:
          - delivery:delivery-package
        gates:
          - type: schema
            artifactType: delivery-package
